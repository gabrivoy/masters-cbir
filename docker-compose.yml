name: cbir

services:
  etcd:
    container_name: cbir-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCDCTL_API: "3"
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
      - --auto-compaction-mode=revision
      - --auto-compaction-retention=1000
      - --quota-backend-bytes=4294967296
      - --snapshot-count=50000
    volumes:
      - milvus_etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s

  minio:
    container_name: cbir-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    command: minio server /minio_data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus_minio:/minio_data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s

  milvus:
    container_name: cbir-milvus
    image: milvusdb/milvus:v2.6.14
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9091/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  attu:
    container_name: cbir-attu
    image: zilliz/attu:v2.6.3
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    ports:
      - "8000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 30s

volumes:
  milvus_etcd:
  milvus_minio:
  milvus_data:
